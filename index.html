<!DOCTYPE html>
<html>
<head>
  <title>YouTube Video</title>
  <style>
    #player { width: 80%; max-width: 800px; margin: 20px auto; }
    button { display: block; margin: 10px auto; }
  </style>
</head>
<body>
  <div id="player"></div>
  <button onclick="play()">Play</button>
  <button onclick="pause()">Pause</button>

  <script>
    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: 's8rI4D_Kuqw',
        playerVars: { 'autoplay': 0, 'controls': 1 },
        events: { 'onReady': onPlayerReady }
      });
    }

    function onPlayerReady() {
      console.log("Player ready");
    }

    function play() { player.playVideo(); }
    function pause() { player.pauseVideo(); }

    // Load YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script');
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  </script>
</body>
</html>
